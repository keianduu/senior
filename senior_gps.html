<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>楽天シニア GPSスポット別スタンプチェックイン 地図モック</title>
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link rel="preconnect" href="https://a.basemaps.cartocdn.com">
  <link rel="preconnect" href="https://b.basemaps.cartocdn.com">
  <link rel="preconnect" href="https://c.basemaps.cartocdn.com">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    /* =========================================================
      Rakuten Senior GPS Stamp Map Style System
      01. Design Tokens
      02. Base / Phone Layout
      03. App Header
      04. Fullscreen Map
      05. Floating Icons / Current Status Card
      06. Facility Pins / Map Popup
      07. Detail Bottom Sheet
      08. Stamp Card Screen
      09. Toast
      10. Responsive Adjustments
    ========================================================= */

    /* 01. Design Tokens */
    :root{
      --orange:#f58a00;
      --deep-orange:#ef8200;
      --soft-bg:#fff0bf;
      --soft-bg-2:#fff8df;
      --text:#333;
      --muted:#777;
      --line:#ead59a;
      --green:#35bd24;
      --green-dark:#169908;
      --red:#bf0000;
      --blue:#2787d8;
      --purple:#8d62d9;
      --gray:#888;
      --header-h:78px;
      --screen-w:430px;
      --radius-card:13px;
      --shadow-card:0 7px 15px rgba(116,84,0,.12);
      --shadow-float:0 6px 18px rgba(0,0,0,.22);
      --font-ja:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Hiragino Kaku Gothic ProN","Yu Gothic",Meiryo,sans-serif;
    }

    /* 02. Base / Phone Layout */
    *{box-sizing:border-box;}
    html,body{
      margin:0;
      min-height:100%;
      font-family:var(--font-ja);
      color:var(--text);
      background:#eee;
    }
    body{display:flex;justify-content:center;}
    button{
      font-family:inherit;
      border:0;
      cursor:pointer;
      -webkit-tap-highlight-color:transparent;
    }
    .phone{
      width:100%;
      max-width:var(--screen-w);
      height:100dvh;
      min-height:640px;
      background:#fff;
      position:relative;
      overflow:hidden;
      box-shadow:0 0 0 1px rgba(0,0,0,.04),0 16px 48px rgba(0,0,0,.16);
    }

    /* 03. App Header */
    .app-header{
      height:var(--header-h);
      background:var(--deep-orange);
      position:absolute;
      left:0;
      right:0;
      top:0;
      color:white;
      padding:8px 24px 10px;
      z-index:50;
    }
    .menu{
      position:absolute;
      left:25px;
      top:8px;
      width:72px;
      text-align:center;
    }
    .hamb{
      font-size:30px;
      line-height:29px;
      font-weight:500;
      display:block;
      letter-spacing:2px;
    }
    .menu-label{
      font-size:16px;
      letter-spacing:2px;
      margin-top:4px;
      display:block;
    }
    .near-btn{
      position:absolute;
      right:20px;
      top:6px;
      height:42px;
      min-width:166px;
      background:white;
      border-radius:5px;
      color:#777;
      font-weight:800;
      font-size:16px;
      display:flex;
      align-items:center;
      gap:7px;
      justify-content:center;
      box-shadow:0 2px 6px rgba(0,0,0,.36);
    }
    .pin-outline{
      width:23px;
      height:23px;
      border:3px solid #7c7c7c;
      border-radius:50% 50% 50% 0;
      transform:rotate(-45deg);
      position:relative;
      margin-right:2px;
    }
    .pin-outline:after{
      content:"";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      width:7px;
      height:7px;
      border:3px solid #7c7c7c;
      border-radius:50%;
    }

    /* 04. Fullscreen Map */
    .map-shell{
      position:absolute;
      top:var(--header-h);
      left:0;
      right:0;
      bottom:0;
      background:
        radial-gradient(circle at 25% 20%,rgba(255,255,255,.7) 0 2px,transparent 3px),
        linear-gradient(135deg,#f8eed1 0%,#f7f1dc 36%,#e8f4dc 36%,#e8f4dc 54%,#f7f1dc 54% 100%);
      z-index:1;
    }
    #map{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      background:#f6efe0;
      z-index:0;
    }
    #map:before{
      content:"地図を読み込み中";
      position:absolute;
      left:50%;
      top:50%;
      transform:translate(-50%,-50%);
      color:#99783a;
      font-size:13px;
      font-weight:900;
      z-index:0;
      pointer-events:none;
    }
    .leaflet-container{
      font-family:var(--font-ja);
      background:#f6efe0;
    }
    .leaflet-tile{
      image-rendering:auto;
      backface-visibility:hidden;
      transform:translateZ(0);
    }
    .leaflet-tile-pane{opacity:.98;}
    .leaflet-control-attribution{font-size:9px;}
    .leaflet-control-zoom{
      border:0!important;
      box-shadow:var(--shadow-float);
      overflow:hidden;
      border-radius:12px;
      margin-bottom:96px!important;
    }
    .leaflet-control-zoom a{
      color:#777!important;
      border:0!important;
      font-weight:900;
    }
    .leaflet-top,
    .leaflet-bottom{z-index:700;}

    /* 05. Floating Icons / Current Status Card */
    .icon-stack{
      position:absolute;
      right:14px;
      top:14px;
      z-index:1300;
      pointer-events:auto;
      transform:translateZ(0);
      display:flex;
      flex-direction:column;
      gap:10px;
    }
    .float-icon{
      width:52px;
      height:52px;
      border-radius:50%;
      background:#fff;
      color:#555;
      font-size:22px;
      font-weight:1000;
      display:flex;
      align-items:center;
      justify-content:center;
      box-shadow:var(--shadow-float);
      position:relative;
    }
    .float-icon:after{
      content:"";
      position:absolute;
      right:3px;
      bottom:4px;
      width:13px;
      height:13px;
      border:3px solid #fff;
      border-radius:50%;
      background:var(--gray);
    }
    .float-icon[data-state="tracking"]:after{background:var(--green);}
    .float-icon[data-state="pending"]:after{background:var(--orange);}
    .float-icon[data-state="error"]:after{background:var(--red);}
    .float-icon[data-state="demo"]:after{background:var(--blue);}
    .float-icon[data-state="stamp"]:after{background:var(--purple);}
    .float-icon.small-text{font-size:14px;}
    .gps-pulse{
      position:absolute;
      inset:0;
      border-radius:50%;
      animation:pulse 1.8s infinite;
      border:2px solid rgba(245,138,0,.35);
      pointer-events:none;
    }
    .float-icon[data-state="tracking"] .gps-pulse{border-color:rgba(53,189,36,.38);}
    @keyframes pulse{
      0%{transform:scale(.88);opacity:.8;}
      80%{transform:scale(1.45);opacity:0;}
      100%{transform:scale(1.45);opacity:0;}
    }
    .current-location-card{
      position:absolute;
      left:14px;
      right:14px;
      bottom:16px;
      z-index:1200;
      min-height:64px;
      padding:12px 13px;
      background:rgba(255,255,255,.96);
      border-radius:14px;
      box-shadow:var(--shadow-float);
      display:flex;
      align-items:center;
      gap:11px;
    }
    .current-location-icon{
      width:40px;
      height:40px;
      border-radius:50%;
      background:#fff2cf;
      color:var(--orange);
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:1000;
      font-size:19px;
      flex:0 0 auto;
    }
    .current-location-body{min-width:0;flex:1;text-align:left;}
    .current-location-body strong{
      display:block;
      font-size:14px;
      font-weight:1000;
      color:#111;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .current-location-body span{
      display:block;
      margin-top:3px;
      color:#666;
      font-size:12px;
      font-weight:800;
      white-space:nowrap;
      overflow:hidden;
      text-overflow:ellipsis;
    }
    .current-location-chevron{
      width:12px;
      height:12px;
      border-top:3px solid var(--orange);
      border-right:3px solid var(--orange);
      transform:rotate(45deg);
      margin-right:4px;
      flex:0 0 auto;
    }

    /* 06. Facility Pins / Map Popup */
    .user-dot,
    .facility-pin{background:transparent;border:0;}
    .user-dot span{
      display:block;
      width:22px;
      height:22px;
      background:#fff;
      border:5px solid var(--blue);
      border-radius:50%;
      box-shadow:0 0 0 8px rgba(39,135,216,.18),0 3px 8px rgba(0,0,0,.2);
    }
    .facility-pin span{
      display:flex;
      align-items:center;
      justify-content:center;
      width:39px;
      height:39px;
      border-radius:50% 50% 50% 0;
      background:var(--orange);
      color:#fff;
      font-size:18px;
      font-weight:1000;
      transform:rotate(-45deg);
      box-shadow:0 5px 12px rgba(0,0,0,.3);
      border:4px solid #fff;
    }
    .facility-pin span i{
      transform:rotate(45deg);
      font-style:normal;
      filter:drop-shadow(0 1px 0 rgba(0,0,0,.14));
    }
    .facility-pin.available span{background:var(--green);}
    .facility-pin.selected span{
      background:var(--red);
      box-shadow:0 0 0 7px rgba(191,0,0,.16),0 5px 14px rgba(0,0,0,.28);
    }
    .leaflet-popup-content-wrapper{
      border-radius:13px;
      box-shadow:0 8px 20px rgba(0,0,0,.22);
    }
    .leaflet-popup-content{margin:10px 12px;}
    .pin-popup{min-width:150px;font-weight:900;line-height:1.4;}
    .pin-popup strong{display:block;font-size:14px;color:#111;}
    .pin-popup span{display:block;color:#777;font-size:12px;}

    /* 07. Detail Bottom Sheet */
    .sheet-backdrop{
      position:absolute;
      inset:0;
      background:rgba(0,0,0,.18);
      z-index:60;
      opacity:0;
      pointer-events:none;
      transition:opacity .2s ease;
    }
    .sheet-backdrop.show{opacity:1;pointer-events:auto;}
    .detail-sheet{
      position:absolute;
      left:0;
      right:0;
      bottom:0;
      z-index:70;
      background:#fff;
      border-radius:22px 22px 0 0;
      box-shadow:0 -12px 28px rgba(0,0,0,.22);
      transform:translateY(105%);
      transition:transform .24s ease;
      overflow:hidden;
      max-height:86dvh;
    }
    .detail-sheet.show{transform:translateY(0);}
    .sheet-handle{
      width:48px;
      height:5px;
      border-radius:999px;
      background:#ddd;
      margin:10px auto 7px;
    }
    .sheet-content{
      padding:4px 18px calc(18px + env(safe-area-inset-bottom));
      max-height:calc(86dvh - 22px);
      overflow:auto;
    }
    .sheet-head{display:flex;gap:13px;align-items:flex-start;}
    .sheet-icon{
      width:54px;
      height:54px;
      border-radius:17px;
      background:#fff2cf;
      color:var(--orange);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:28px;
      font-weight:1000;
      flex:0 0 auto;
      box-shadow:inset 0 -3px 0 rgba(0,0,0,.06);
    }
    .sheet-title-wrap{min-width:0;flex:1;}
    .sheet-eyebrow{
      display:inline-flex;
      min-height:22px;
      align-items:center;
      padding:3px 8px;
      border-radius:999px;
      background:#fff1c8;
      color:#9d6800;
      font-size:11px;
      font-weight:1000;
      margin-bottom:7px;
    }
    .sheet-title{
      font-size:20px;
      line-height:1.25;
      color:#111;
      font-weight:1000;
      margin:0;
    }
    .sheet-close{
      width:34px;
      height:34px;
      border-radius:50%;
      background:#f4f4f4;
      color:#777;
      font-size:21px;
      line-height:1;
      display:flex;
      align-items:center;
      justify-content:center;
      flex:0 0 auto;
    }
    .sheet-description{
      color:#555;
      font-size:13px;
      line-height:1.55;
      font-weight:800;
      margin:13px 0 12px;
    }
    .sheet-metrics{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:9px;
      margin-bottom:13px;
    }
    .metric{
      min-height:55px;
      border:1px solid #f1dfad;
      background:#fffaf0;
      border-radius:12px;
      padding:9px 10px;
    }
    .metric span{
      display:block;
      color:#777;
      font-size:11px;
      font-weight:900;
      margin-bottom:4px;
    }
    .metric strong{
      color:#111;
      font-size:16px;
      line-height:1.2;
      font-weight:1000;
    }
    .sheet-actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
    .sheet-actions.three{grid-template-columns:1fr 1fr 1fr;}
    .primary-btn,
    .secondary-btn{
      min-height:46px;
      border-radius:9px;
      font-size:15px;
      font-weight:1000;
      padding:0 8px;
    }
    .sheet-actions.three .primary-btn,
    .sheet-actions.three .secondary-btn{font-size:13px;}
    .primary-btn{color:#fff;background:var(--orange);box-shadow:0 4px 0 #cf7300;}
    .primary-btn:disabled{background:#cfcfcf;box-shadow:0 4px 0 #aaa;cursor:not-allowed;}
    .secondary-btn{
      color:#9d6800;
      background:#fff2cf;
      text-decoration:none;
      display:flex;
      align-items:center;
      justify-content:center;
    }
    .gps-help-list{margin:8px 0 0;padding:0;list-style:none;}
    .gps-help-list li{
      display:flex;
      gap:8px;
      color:#555;
      font-size:12px;
      line-height:1.45;
      font-weight:800;
      margin-top:8px;
    }
    .gps-help-list li:before{
      content:"✓";
      width:18px;
      height:18px;
      border-radius:50%;
      background:#e8f8e6;
      color:var(--green-dark);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:11px;
      font-weight:1000;
      flex:0 0 auto;
    }

    /* 08. Stamp Card Screen */
    .stamp-summary{
      border:3px solid #ffe2a0;
      border-radius:18px;
      background:linear-gradient(180deg,#fffaf0 0%,#fff3cd 100%);
      padding:14px;
      margin:13px 0;
      box-shadow:var(--shadow-card);
    }
    .stamp-summary-top{
      display:flex;
      align-items:center;
      gap:10px;
      margin-bottom:12px;
    }
    .stamp-badge{
      width:46px;
      height:46px;
      border-radius:50%;
      background:var(--orange);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:24px;
      font-weight:1000;
      flex:0 0 auto;
      box-shadow:inset 0 -4px 0 rgba(0,0,0,.12);
    }
    .stamp-summary-title{min-width:0;flex:1;}
    .stamp-summary-title strong{display:block;font-size:17px;font-weight:1000;color:#111;}
    .stamp-summary-title span{display:block;margin-top:2px;font-size:12px;font-weight:900;color:#7a5a1a;}
    .stamp-grid{
      display:grid;
      grid-template-columns:repeat(7,1fr);
      gap:8px;
    }
    .stamp-cell{
      aspect-ratio:1;
      border-radius:50%;
      border:3px dashed #e7c879;
      background:#fff;
      color:#d8b45e;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:1000;
      font-size:18px;
      position:relative;
    }
    .stamp-cell.filled{
      border-style:solid;
      border-color:var(--orange);
      background:#fff;
      color:var(--orange);
      box-shadow:0 3px 0 #f1c35e;
    }
    .stamp-cell.filled:before{content:"★";}
    .stamp-cell.empty:before{content:"";width:7px;height:7px;border-radius:50%;background:#f0d995;}
    .stamp-note{
      display:flex;
      gap:8px;
      margin-top:12px;
      padding:10px 11px;
      border-radius:12px;
      background:rgba(255,255,255,.72);
      color:#6c5320;
      font-size:12px;
      line-height:1.45;
      font-weight:900;
    }
    .stamp-note:before{content:"i";width:18px;height:18px;border-radius:50%;background:#f5d071;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:1000;flex:0 0 auto;}
    .stamp-status-list{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:13px;}
    .stamp-status-item{border:1px solid #ead59a;border-radius:12px;background:#fffaf0;padding:10px;}
    .stamp-status-item span{display:block;color:#777;font-size:11px;font-weight:900;margin-bottom:5px;}
    .stamp-status-item strong{display:block;color:#111;font-size:15px;font-weight:1000;line-height:1.25;}

    /* 09. Toast */
    .complete-toast{
      position:absolute;
      left:18px;
      right:18px;
      bottom:18px;
      z-index:90;
      display:none;
      align-items:center;
      gap:10px;
      min-height:62px;
      padding:12px 14px calc(12px + env(safe-area-inset-bottom));
      border-radius:14px;
      background:#fff;
      box-shadow:0 9px 25px rgba(0,0,0,.22);
      border:3px solid #ffe2a0;
    }
    .complete-toast.show{display:flex;animation:pop .28s ease-out;}
    .toast-icon{
      width:38px;
      height:38px;
      border-radius:50%;
      background:var(--orange);
      color:#fff;
      display:flex;
      align-items:center;
      justify-content:center;
      font-weight:1000;
      font-size:21px;
      flex:0 0 auto;
    }
    .toast-body strong{display:block;color:#111;font-size:15px;font-weight:1000;margin-bottom:2px;}
    .toast-body span{color:#666;font-size:12px;font-weight:800;line-height:1.35;}
    @keyframes pop{from{opacity:0;transform:translateY(10px) scale(.96);}to{opacity:1;transform:translateY(0) scale(1);}}

    /* 10. Responsive Adjustments */
    @media (max-width:370px){
      .near-btn{min-width:154px;font-size:15px;}
      .float-icon{width:48px;height:48px;}
      .sheet-title{font-size:18px;}
      .sheet-content{padding-left:15px;padding-right:15px;}
      .sheet-actions.three{grid-template-columns:1fr;}
      .stamp-grid{gap:5px;}
    }
  </style>
</head>
<body>
  <div class="phone" aria-label="楽天シニアアプリのGPSスタンプチェックイン地図モック">
    <header class="app-header">
      <div class="menu"><span class="hamb">☰</span><span class="menu-label">メニュー</span></div>
      <button class="near-btn" id="headerNearBtn" aria-label="現在地付近に戻る"><span class="pin-outline"></span><span>近くの施設を探す</span></button>
    </header>

    <section class="map-shell" aria-label="近くのスタンプ取得スポットを表示する地図">
      <div id="map"></div>

      <div class="icon-stack" aria-label="地図操作">
        <button class="float-icon" id="gpsStatusBtn" data-state="pending" aria-label="GPS状態の詳細を見る"><span class="gps-pulse"></span><span id="gpsStatusIcon">📡</span></button>
        <button class="float-icon" id="recenterBtn" data-state="tracking" aria-label="現在地に戻る">◎</button>
        <button class="float-icon" id="stampBtn" data-state="stamp" aria-label="スタンプカードを見る">⭐</button>
        <button class="float-icon small-text" id="demoBtn" data-state="demo" aria-label="二子玉川のデモ位置に移動">デモ</button>
      </div>

      <button class="current-location-card" id="currentInfoCard" type="button" aria-label="現在地と最寄りスポットの詳細を見る">
        <div class="current-location-icon" id="currentInfoIcon">📍</div>
        <div class="current-location-body">
          <strong id="currentInfoTitle">GPS許可待ち</strong>
          <span id="currentInfoText">許可すると現在地に自動追従します</span>
        </div>
        <div class="current-location-chevron"></div>
      </button>
    </section>

    <div class="sheet-backdrop" id="sheetBackdrop"></div>
    <section class="detail-sheet" id="detailSheet" aria-label="詳細パネル" aria-live="polite">
      <div class="sheet-handle"></div>
      <div class="sheet-content" id="sheetContent"></div>
    </section>

    <div class="complete-toast" id="completeToast" role="status" aria-live="polite">
      <div class="toast-icon">✓</div>
      <div class="toast-body"><strong id="toastTitle">スタンプ取得完了！</strong><span id="toastText">スタンプカードに1つ押しました。</span></div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    /* =========================================================
      GPS Stamp Map Controller
      01. Facility Master Data
      02. Stamp State
      03. State / DOM References
      04. Map Initialization
      05. GPS Permission / Watch Position
      06. Distance / Availability Logic
      07. Detail Sheet Rendering
      08. Stamp Card Rendering
      09. Map / Button Events
    ========================================================= */

    /* 01. Facility Master Data */
    const CHECKIN_RADIUS_M = 50;
    const DEFAULT_CENTER = { lat: 35.61103, lng: 139.62662 };
    const facilities = [
      { id:"rise-galleria", name:"二子玉川ライズ ガレリア前", lat:35.61129, lng:139.62705, category:"商業施設", icon:"🏬", description:"駅直結の広場前スポット。買い物や通院帰りにも立ち寄りやすい場所です。" },

    /* 02. Stamp State */
    const STAMP_STORAGE_KEY = "rakutenSeniorStampDemoV4";
    const STAMPS_PER_POINT = 7;
    let stampState = loadStampState();

    function todayKey(){
      const d = new Date();
      const y = d.getFullYear();
      const m = String(d.getMonth() + 1).padStart(2,"0");
      const day = String(d.getDate()).padStart(2,"0");
      return `${y}-${m}-${day}`;
    }
    function tomorrowMidnightText(){ return "明日 00:00以降"; }
    function normalizeStampState(data){
      return {
        stampCount:0,
        pendingPoints:0,
        lastStampedBySpot:{},
        ...data,
        lastStampedBySpot:{ ...(data && data.lastStampedBySpot ? data.lastStampedBySpot : {}) }
      };
    }
    function canStampSpotToday(facilityId){ return stampState.lastStampedBySpot[facilityId] !== todayKey(); }
    function loadStampState(){
      try{
        const raw = localStorage.getItem(STAMP_STORAGE_KEY);
        if(raw) return normalizeStampState(JSON.parse(raw));
      }catch(e){ console.warn(e); }
      return normalizeStampState({ stampCount:3, pendingPoints:0 });
    }
    function saveStampState(){
      try{ localStorage.setItem(STAMP_STORAGE_KEY, JSON.stringify(stampState)); }catch(e){ console.warn(e); }
    }
    function nextAvailableText(facilityId){ return canStampSpotToday(facilityId) ? "今すぐ取得可能" : tomorrowMidnightText(); }
    function stampStatusText(facilityId){ return canStampSpotToday(facilityId) ? "本日未取得" : "本日取得済み"; }
    function stampedTodayCount(){
      const key = todayKey();
      return facilities.filter(facility => stampState.lastStampedBySpot[facility.id] === key).length;
    }

    /* 03. State / DOM References */
    const state = {
      map:null,
      userMarker:null,
      accuracyCircle:null,
      facilityMarkers:new Map(),
      routeLine:null,
      mapReady:false,
      userPosition:null,
      autoFollow:true,
      gpsState:"pending",
      selectedFacility:null
    };

    const els = {
      gpsStatusBtn:document.getElementById("gpsStatusBtn"),
      gpsStatusIcon:document.getElementById("gpsStatusIcon"),
      recenterBtn:document.getElementById("recenterBtn"),
      stampBtn:document.getElementById("stampBtn"),
      demoBtn:document.getElementById("demoBtn"),
      headerNearBtn:document.getElementById("headerNearBtn"),
      currentInfoCard:document.getElementById("currentInfoCard"),
      currentInfoIcon:document.getElementById("currentInfoIcon"),
      currentInfoTitle:document.getElementById("currentInfoTitle"),
      currentInfoText:document.getElementById("currentInfoText"),
      sheetBackdrop:document.getElementById("sheetBackdrop"),
      detailSheet:document.getElementById("detailSheet"),
      sheetContent:document.getElementById("sheetContent"),
      completeToast:document.getElementById("completeToast"),

      toastText:document.getElementById("toastText")

    /* 04. Map Initialization */
    function initMap(){
      const mapEl = document.getElementById("map");
      if(!window.L){
        if(mapEl) mapEl.innerHTML = '<div style="position:absolute;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;text-align:center;color:#99783a;font-weight:900;line-height:1.6;background:#fff5d9;">地図ライブラリを読み込めませんでした。通信環境を確認してください。</div>';
        return;
      }

      state.map = L.map("map", {
        zoomControl:false,
        attributionControl:true,
        preferCanvas:true,
        zoomSnap:.25,
        zoomDelta:.5
      }).setView([DEFAULT_CENTER.lat, DEFAULT_CENTER.lng], 16.25);
      L.control.zoom({ position:"bottomright" }).addTo(state.map);

      const cartoVoyager = L.tileLayer("https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png", {
        subdomains:"abcd",
        maxZoom:20,
        maxNativeZoom:19,
        detectRetina:true,
        updateWhenIdle:false,
        updateWhenZooming:true,
        keepBuffer:4,
        attribution:'&copy; OpenStreetMap &copy; CARTO'
      });
      const osmFallback = L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
        maxZoom:19,
        detectRetina:true,
        updateWhenIdle:false,
        updateWhenZooming:true,
        keepBuffer:4,
        attribution:'&copy; OpenStreetMap'
      });

      let tileErrorCount = 0;
      cartoVoyager.on("tileerror", () => {
        tileErrorCount += 1;
        if(tileErrorCount >= 4 && state.map && state.map.hasLayer(cartoVoyager)){
          state.map.removeLayer(cartoVoyager);
          osmFallback.addTo(state.map);
        }
      });
      cartoVoyager.addTo(state.map);

      facilities.forEach((facility) => {
        const marker = L.marker([facility.lat, facility.lng], { icon:makeFacilityIcon(facility, false, false), zIndexOffset:500 })
          .addTo(state.map)
          .bindPopup(makePinPopup(facility))
          .on("click", () => selectFacility(facility.id, true));
        state.facilityMarkers.set(facility.id, marker);
      });

      state.map.on("dragstart", () => { state.autoFollow = false; });
      state.mapReady = true;
      state.map.whenReady(() => {
        [0, 80, 250, 700, 1200].forEach(delay => {
          window.setTimeout(() => state.map.invalidateSize({ pan:false }), delay);
        });
      });
    }

    function makeFacilityIcon(facility, isAvailable, isSelected){
      return L.divIcon({
        className:`facility-pin ${isAvailable ? "available" : ""} ${isSelected ? "selected" : ""}`,
        html:`<span><i>${facility.icon}</i></span>`,
        iconSize:[39,39],
        iconAnchor:[19,37],
        popupAnchor:[0,-35]
      });
    }
    function makeUserIcon(){
      return L.divIcon({ className:"user-dot", html:"<span></span>", iconSize:[28,28], iconAnchor:[14,14] });
    }
    function makePinPopup(facility){
      return `<div class="pin-popup"><strong>${facility.name}</strong><span>${facility.category}</span></div>`;
    }

    /* 05. GPS Permission / Watch Position */
    function startGeolocation(){
      setGpsState("pending", "GPS許可待ち", "許可すると現在地に自動追従します");

      if(!navigator.geolocation){
        setGpsState("error", "GPS未対応", "このブラウザでは位置情報を利用できません。デモ位置で確認できます");
        setUserPosition(DEFAULT_CENTER.lat, DEFAULT_CENTER.lng, 0, false);
        return;
      }

      navigator.geolocation.watchPosition(
        (pos) => {
          const { latitude, longitude, accuracy } = pos.coords;
          setUserPosition(latitude, longitude, accuracy, false);
          setGpsState("tracking", "GPS追跡中", `現在地を自動更新中。測位精度：約${Math.round(accuracy)}m`);
        },
        (err) => {
          console.warn(err);
          setGpsState("error", "GPS取得できません", "位置情報の許可設定を確認してください。デモ位置でも確認できます");
          if(!state.userPosition) setUserPosition(DEFAULT_CENTER.lat, DEFAULT_CENTER.lng, 0, false);
        },
        { enableHighAccuracy:true, maximumAge:3000, timeout:10000 }
      );
    }

    function setGpsState(status, title, text){
      state.gpsState = status;
      const iconMap = { pending:"📡", tracking:"📍", error:"⚠️", demo:"📘" };
      els.gpsStatusBtn.dataset.state = status;
      els.gpsStatusIcon.textContent = iconMap[status] || "📡";
      els.currentInfoTitle.textContent = title;
      els.currentInfoText.textContent = text;
      els.currentInfoIcon.textContent = iconMap[status] || "📍";
    }

    function setUserPosition(lat, lng, accuracy = 0, isDemo = false){
      state.userPosition = { lat, lng, accuracy, isDemo };
      if(isDemo) setGpsState("demo", "デモ位置で確認中", "二子玉川ライズ周辺のサンプル位置です");
      updateUserMarker();
      updateFacilityMarkers();
      updateCurrentSummary();
      if(state.selectedFacility) drawRoute(state.selectedFacility.id, false);
    }

    function updateUserMarker(){
      if(!state.mapReady || !state.userPosition) return;
      const { lat, lng, accuracy } = state.userPosition;
      const latLng = [lat, lng];

      if(!state.userMarker){
        state.userMarker = L.marker(latLng, { icon:makeUserIcon(), zIndexOffset:1000 }).addTo(state.map);
      }else{
        state.userMarker.setLatLng(latLng);
      }

      if(accuracy > 0){
        if(!state.accuracyCircle){
          state.accuracyCircle = L.circle(latLng, { radius:accuracy, color:"#2787d8", weight:1, fillColor:"#2787d8", fillOpacity:.08 }).addTo(state.map);
        }else{
          state.accuracyCircle.setLatLng(latLng).setRadius(accuracy);
        }
      }

      if(state.autoFollow){
        state.map.setView(latLng, Math.max(state.map.getZoom(), 16), { animate:true });
      }
    }

    /* 06. Distance / Availability Logic */
    function distanceMeters(a, b){
      const R = 6371000;
      const toRad = deg => deg * Math.PI / 180;
      const dLat = toRad(b.lat - a.lat);
      const dLng = toRad(b.lng - a.lng);
      const lat1 = toRad(a.lat);
      const lat2 = toRad(b.lat);
      const h = Math.sin(dLat/2) ** 2 + Math.cos(lat1) * Math.cos(lat2) * Math.sin(dLng/2) ** 2;
      return 2 * R * Math.asin(Math.sqrt(h));
    }
    function facilitiesWithDistance(){
      const origin = state.userPosition || DEFAULT_CENTER;
      return facilities.map(facility => ({ ...facility, distance:distanceMeters(origin, facility) })).sort((a,b) => a.distance - b.distance);
    }
    function formatDistance(m){
      if(!Number.isFinite(m)) return "-- m";
      if(m >= 1000) return `${(m/1000).toFixed(1)} km`;
      return `${Math.round(m)} m`;
    }
    function updateFacilityMarkers(){
      if(!state.mapReady) return;
      facilitiesWithDistance().forEach((facility) => {
        const marker = state.facilityMarkers.get(facility.id);
        if(!marker) return;
        const source = facilities.find(item => item.id === facility.id);
        marker.setIcon(makeFacilityIcon(source, facility.distance <= CHECKIN_RADIUS_M && canStampSpotToday(facility.id), state.selectedFacility && state.selectedFacility.id === facility.id));
      });
    }
    function updateCurrentSummary(){
      const nearest = facilitiesWithDistance()[0];
      if(!nearest) return;
      if(state.gpsState === "tracking" || state.gpsState === "demo"){
        const possible = nearest.distance <= CHECKIN_RADIUS_M && canStampSpotToday(nearest.id);
        els.currentInfoTitle.textContent = possible ? "このスポットでスタンプを取得できます" : stampStatusText(nearest.id);
        els.currentInfoText.textContent = `${nearest.name}まで ${formatDistance(nearest.distance)} / 次回：${nextAvailableText(nearest.id)}`;
      }
    }

    /* 07. Detail Sheet Rendering */
    function openGpsDetail(){
      const detailByState = {
        pending:{ icon:"📡", eyebrow:"GPS状態", title:"GPS許可待ち", desc:"位置情報の許可ダイアログが表示されたら許可してください。許可後は、ページを開いた状態で現在地を自動更新します。" },
        tracking:{ icon:"📍", eyebrow:"GPS状態", title:"GPS追跡中", desc:"GPSがONです。ユーザーが移動すると現在地マーカーが更新され、地図も現在地に追従します。" },
        error:{ icon:"⚠️", eyebrow:"GPS状態", title:"GPS取得できません", desc:"ブラウザまたは端末側で位置情報がブロックされている可能性があります。設定から位置情報を許可してください。" },
        demo:{ icon:"📘", eyebrow:"デモ状態", title:"デモ位置で確認中", desc:"二子玉川ライズ周辺のサンプル位置です。実機では位置情報を許可すると現在地に切り替わります。" }
      };
      const data = detailByState[state.gpsState] || detailByState.pending;
      const nearest = facilitiesWithDistance()[0];
      els.sheetContent.innerHTML = `
        <div class="sheet-head">
          <div class="sheet-icon">${data.icon}</div>
          <div class="sheet-title-wrap">
            <span class="sheet-eyebrow">${data.eyebrow}</span>
            <h2 class="sheet-title">${data.title}</h2>
          </div>
          <button class="sheet-close" data-close="true" aria-label="閉じる">×</button>
        </div>
        <p class="sheet-description">${data.desc}</p>
        <div class="sheet-metrics">
          <div class="metric"><span>自動追従</span><strong>${state.autoFollow ? "ON" : "手動移動中"}</strong></div>
          <div class="metric"><span>最寄りスポット</span><strong>${nearest ? formatDistance(nearest.distance) : "--"}</strong></div>
        </div>
        <ul class="gps-help-list">
          <li>ページ表示時にGPS取得を開始します。</li>
          <li>右上の◎を押すと現在地への追従に戻ります。</li>
          <li>スタンプ取得は1スポットにつき1日1回までです。</li>
        </ul>
      `;
      showSheet();
    }

    function openFacilityDetail(facilityId){
      const facility = facilitiesWithDistance().find(item => item.id === facilityId);
      if(!facility) return;
      state.selectedFacility = facilities.find(item => item.id === facilityId);
      updateFacilityMarkers();
      const canStamp = facility.distance <= CHECKIN_RADIUS_M && canStampSpotToday(facility.id);
      const remaining = Math.max(0, Math.ceil(facility.distance - CHECKIN_RADIUS_M));
      const buttonLabel = !canStampSpotToday(facility.id) ? "本日取得済み" : canStamp ? "スタンプを押す" : `あと${remaining}m近づく`;

      els.sheetContent.innerHTML = `
        <div class="sheet-head">
          <div class="sheet-icon">${facility.icon}</div>
          <div class="sheet-title-wrap">
            <span class="sheet-eyebrow">${facility.category}</span>
            <h2 class="sheet-title">${facility.name}</h2>
          </div>
          <button class="sheet-close" data-close="true" aria-label="閉じる">×</button>
        </div>
        <p class="sheet-description">${facility.description}</p>
        <div class="sheet-metrics">
          <div class="metric"><span>現在地から</span><strong>${formatDistance(facility.distance)}</strong></div>
          <div class="metric"><span>このスポットの取得状態</span><strong>${stampStatusText(facility.id)}</strong></div>
          <div class="metric"><span>次の取得可能時間</span><strong>${nextAvailableText(facility.id)}</strong></div>
          <div class="metric"><span>スタンプカード</span><strong>${stampState.stampCount}/${STAMPS_PER_POINT}個</strong></div>

          </div>
          ${stampGridHtml()}

        <div class="sheet-actions three">
          <button class="primary-btn" id="sheetStampBtn" ${canStamp ? "" : "disabled"}>${buttonLabel}</button>
          <button class="secondary-btn" id="sheetCardBtn">カードを見る</button>
          <button class="secondary-btn" id="sheetRouteBtn">道順</button>
        </div>
      `;
      showSheet();
      const stampBtn = document.getElementById("sheetStampBtn");
      const cardBtn = document.getElementById("sheetCardBtn");
      const routeBtn = document.getElementById("sheetRouteBtn");
      if(stampBtn) stampBtn.addEventListener("click", () => addStamp(facility.id));
      if(cardBtn) cardBtn.addEventListener("click", openStampCard);
      if(routeBtn) routeBtn.addEventListener("click", () => drawRoute(facility.id, true));
    }

    function showSheet(){ els.sheetBackdrop.classList.add("show"); els.detailSheet.classList.add("show"); }
    function closeSheet(){ els.sheetBackdrop.classList.remove("show"); els.detailSheet.classList.remove("show"); }

    /* 08. Stamp Card Rendering */
    function stampGridHtml(){
      return `<div class="stamp-grid">${Array.from({ length:STAMPS_PER_POINT }).map((_,idx) => `<div class="stamp-cell ${idx < stampState.stampCount ? "filled" : "empty"}" aria-label="${idx + 1}個目"></div>`).join("")}</div>`;
    }
    function openStampCard(){
      const remaining = STAMPS_PER_POINT - stampState.stampCount;
      els.sheetContent.innerHTML = `
        <div class="sheet-head">
          <div class="sheet-icon">⭐</div>
          <div class="sheet-title-wrap">

          </div>
          <button class="sheet-close" data-close="true" aria-label="閉じる">×</button>
        </div>
        <div class="stamp-summary">
          <div class="stamp-summary-top">
            <div class="stamp-badge">⭐</div>
            <div class="stamp-summary-title">
              <strong>${stampState.stampCount}/${STAMPS_PER_POINT}個たまっています</strong>
              <span>${remaining === STAMPS_PER_POINT ? "新しいカードが始まりました" : `あと${remaining}個で1ポイント配布対象`}</span>
            </div>
          </div>
          ${stampGridHtml()}
          <div class="stamp-note">各チェックポイントで取得できるのは1日1回です。別スポットなら同日でも取得できます。7個たまると1ポイントの配布対象になります。</div>
        </div>
        <div class="stamp-status-list">
          <div class="stamp-status-item"><span>本日取得済みスポット</span><strong>${stampedTodayCount()}/${facilities.length}件</strong></div>
          <div class="stamp-status-item"><span>次に取得できる条件</span><strong>未取得スポットで50m以内</strong></div>
          <div class="stamp-status-item"><span>配布対象ポイント</span><strong>${stampState.pendingPoints}ポイント分</strong></div>
          <div class="stamp-status-item"><span>対象スポット</span><strong>二子玉川周辺 ${facilities.length}件</strong></div>
        </div>
        <div class="sheet-actions">
          <button class="primary-btn" id="stampNearestBtn">近くのスポットを見る</button>
          <button class="secondary-btn" id="stampResetBtn">デモ初期化</button>
        </div>
      `;
      showSheet();
      const nearestBtn = document.getElementById("stampNearestBtn");
      const resetBtn = document.getElementById("stampResetBtn");
      if(nearestBtn) nearestBtn.addEventListener("click", () => {
        const nearest = facilitiesWithDistance()[0];
        if(nearest) openFacilityDetail(nearest.id);
      });
      if(resetBtn) resetBtn.addEventListener("click", resetStampDemo);
    }
    function addStamp(facilityId){
      const facility = facilitiesWithDistance().find(item => item.id === facilityId);
      if(!facility || facility.distance > CHECKIN_RADIUS_M || !canStampSpotToday(facility.id)) return;

      stampState.lastStampedBySpot[facility.id] = todayKey();
      stampState.stampCount += 1;
      let completed = false;
      if(stampState.stampCount >= STAMPS_PER_POINT){
        stampState.pendingPoints += 1;
        stampState.stampCount = 0;
        completed = true;
      }
      saveStampState();
      updateFacilityMarkers();
      updateCurrentSummary();

      if(completed){
        showToast("7個達成！", "1ポイントの配布対象になりました。新しいカードを開始します。");
      }else{
        showToast("スタンプ取得完了！", `${facility.name}でスタンプを1つ押しました。あと${STAMPS_PER_POINT - stampState.stampCount}個で1ポイントです。`);
      }
      openFacilityDetail(facility.id);
    }
    function resetStampDemo(){
      stampState = normalizeStampState({ stampCount:3, pendingPoints:0 });
      saveStampState();
      updateFacilityMarkers();
      updateCurrentSummary();
      showToast("デモを初期化しました", "スタンプ3個の状態に戻しました。");
      openStampCard();
    }
    function showToast(title, text){
      els.toastTitle.textContent = title;
      els.toastText.textContent = text;
      els.completeToast.classList.add("show");
      window.setTimeout(() => els.completeToast.classList.remove("show"), 3600);
    }

    function drawRoute(facilityId, fit = true){
      const facility = facilities.find(item => item.id === facilityId);
      if(!facility || !state.userPosition || !state.mapReady) return;
      const latLngs = [[state.userPosition.lat, state.userPosition.lng], [facility.lat, facility.lng]];
      if(state.routeLine) state.routeLine.remove();
      state.routeLine = L.polyline(latLngs, { color:"#f58a00", weight:6, opacity:.9, dashArray:"10 8" }).addTo(state.map);
      if(fit) state.map.fitBounds(latLngs, { padding:[70,70], animate:true });
    }
    function selectFacility(facilityId, openDetail = true){
      state.selectedFacility = facilities.find(item => item.id === facilityId) || null;
      updateFacilityMarkers();
      if(openDetail) openFacilityDetail(facilityId);
    }

    /* 09. Map / Button Events */
    function recenter(){
      state.autoFollow = true;
      if(state.userPosition && state.mapReady){ state.map.setView([state.userPosition.lat, state.userPosition.lng], 17, { animate:true }); }
      updateCurrentSummary();
    }

    els.gpsStatusBtn.addEventListener("click", openGpsDetail);
    els.stampBtn.addEventListener("click", openStampCard);
    els.currentInfoCard.addEventListener("click", () => {
      const nearest = facilitiesWithDistance()[0];
      if((state.gpsState === "tracking" || state.gpsState === "demo") && nearest){ openFacilityDetail(nearest.id); }
      else{ openGpsDetail(); }
    });
    els.recenterBtn.addEventListener("click", recenter);
    els.headerNearBtn.addEventListener("click", recenter);
    els.demoBtn.addEventListener("click", () => {
      state.autoFollow = true;
      setUserPosition(35.61127, 139.62702, 8, true);
      recenter();
    });
    els.sheetBackdrop.addEventListener("click", closeSheet);
    els.sheetContent.addEventListener("click", (event) => { if(event.target.dataset.close) closeSheet(); });

    initMap();
    startGeolocation();
  </script>
</body>
</html>
